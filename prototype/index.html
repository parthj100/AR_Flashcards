<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>Lens — AR Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app"></div>

  <!-- ⌘K Search overlay -->
  <div id="search-overlay" class="search-overlay" hidden>
    <div class="search-modal">
      <div class="search-input-row">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search-input" type="text" placeholder="Search cards, decks, formulas…" autofocus />
        <kbd>esc</kbd>
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <!-- Generation overlay shown while Ollama is writing a flashcard -->
  <div id="gen-overlay" class="gen-overlay" hidden>
    <div class="gen-card">
      <div class="gen-spinner"></div>
      <div class="gen-head">Writing flashcard</div>
      <div class="gen-topic" id="gen-topic">…</div>
      <div class="gen-sub" id="gen-sub">Phi-3 is composing the explanation and key facts.</div>
    </div>
  </div>

  <!-- Mock data first (legacy scripts read window.LENS_DATA) -->
  <script src="data.js"></script>
  <script src="app.js"></script>

  <!-- ML modules — loaded as ES modules, kick off model init after app.js mounts -->
  <script type="module">
    import * as Clip from './lib/clip.js';
    import * as Llm  from './lib/llm.js';
    import { Camera } from './lib/camera.js';

    // Expose to the global scope so app.js (non-module) can use them.
    window.LensML = { Clip, Llm, Camera };
    window.dispatchEvent(new CustomEvent('lens-ml-ready'));
  </script>
</body>
</html>
